<!doctype html>
<html>
<head>
</head>
<body>
<h2>Example of HTML bdo tag</h2>
<p >This is Normal Content with default directionality</p>


<p>This is with left to right directionality:
<bdo dir="ltr"">A beautiful Flower</bdo>
</p>
<p>This is with right to left directionality:
<bdo dir="rtl" ">A beautiful Flower</bdo>
</p>
</body>
</html>
